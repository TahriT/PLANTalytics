<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLANTalytics — Original Power BI (Legacy)</title>
    <script src="https://cdn.jsdelivr.net/npm/powerbi-client@2.23.1/dist/powerbi.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --green-dark:  #2d5016;
            --green-mid:   #6b9e3e;
            --green-light: #9ec472;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #111;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ── Header ── */
        header {
            background: linear-gradient(135deg, var(--green-dark), var(--green-mid));
            color: #fff;
            padding: 6px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            flex-shrink: 0;
            box-shadow: 0 2px 6px rgba(0,0,0,.35);
        }

        .hd-left {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.92rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .hd-left .badge {
            font-size: 0.68rem;
            font-weight: 400;
            opacity: .65;
            background: rgba(255,255,255,.15);
            padding: 2px 7px;
            border-radius: 10px;
        }

        .hd-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .hd-btn {
            background: rgba(255,255,255,.18);
            border: none;
            color: #fff;
            font-size: 0.78rem;
            padding: 4px 10px;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            text-decoration: none;
            transition: background .2s;
            white-space: nowrap;
        }

        .hd-btn:hover { background: rgba(255,255,255,.30); }

        /* ── Status toast ── */
        #toast {
            position: fixed;
            bottom: 12px;
            right: 14px;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.78rem;
            font-weight: 500;
            opacity: 0;
            pointer-events: none;
            transition: opacity .25s;
            z-index: 999;
        }
        #toast.show { opacity: 1; }
        #toast.ok  { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        #toast.err { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        /* ── Report fills remaining height ── */
        #reportContainer {
            flex: 1;
            width: 100%;
            border: none;
            background: #1a1a1a;
        }

        @media (max-width: 600px) {
            .hd-left { font-size: 0.8rem; }
            .hd-btn  { font-size: 0.72rem; padding: 3px 7px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="hd-left">
            <i class="fas fa-seedling"></i>
            PLANTalytics
            <span class="badge">Original Power BI · Legacy</span>
        </div>
        <div class="hd-right">
            <button class="hd-btn" onclick="refreshReport()" title="Reload report data">
                <i class="fas fa-sync-alt"></i> Refresh
            </button>
            <button class="hd-btn" onclick="toggleFullscreen()" title="Power BI fullscreen">
                <i class="fas fa-expand"></i> Fullscreen
            </button>
            <a href="index.html" class="hd-btn">
                <i class="fas fa-arrow-left"></i> Home
            </a>
        </div>
    </header>

    <div id="reportContainer"></div>

    <div id="toast"></div>

    <script>
        const embedConfig = {
            type: 'report',
            tokenType: window.powerbi.models.TokenType.Embed,
            accessToken: 'eyJrIjoiYzI0ZmIyZmYtOWNjZS00NWIzLThjMmMtYmMyOTgwOThlYTUzIiwidCI6IjA5MmUzOThlLTIzYTktNGFjMS04MmJmLWIwMzQ2NTRlMGZjMyJ9',
            embedUrl: 'https://app.powerbi.com/view?r=eyJrIjoiYzI0ZmIyZmYtOWNjZS00NWIzLThjMmMtYmMyOTgwOThlYTUzIiwidCI6IjA5MmUzOThlLTIzYTktNGFjMS04MmJmLWIwMzQ2NTRlMGZjMyJ9',
            id: 'c24fb2ff-9cce-45b3-8c2c-bc298098ea53',
            permissions: window.powerbi.models.Permissions.Read,
            settings: {
                filterPaneEnabled: true,
                navContentPaneEnabled: true,
                background: window.powerbi.models.BackgroundType.Transparent
            }
        };

        let report;

        function loadReport() {
            report = window.powerbi.embed(document.getElementById('reportContainer'), embedConfig);
            report.on('loaded',   () => toast('Report loaded', 'ok'));
            report.on('error', e  => toast('Load error: ' + (e.detail || 'unknown'), 'err'));
        }

        function refreshReport() {
            if (!report) return;
            report.refresh()
                .then(() => toast('Refreshed', 'ok'))
                .catch(() => toast('Refresh failed', 'err'));
        }

        function toggleFullscreen() {
            if (!report) return;
            report.fullscreen().catch(() => toast('Fullscreen unavailable', 'err'));
        }

        let _toastTimer;
        function toast(msg, type) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'show ' + type;
            clearTimeout(_toastTimer);
            _toastTimer = setTimeout(() => { el.className = ''; }, 4000);
        }

        window.addEventListener('load', loadReport);
    </script>
</body>
</html>
